name: poll

# Runs taifu on a schedule and persists the cache by committing it back to the
# repo. The repo IS the database: each run checks out the accumulated history,
# polls JMA for anything new, and commits the updated cache. A second job then
# renders the cache into a static site and publishes it to GitHub Pages.
on:
  schedule:
    # Every 30 minutes, at :05 and :35 to dodge the top-of-hour pileup when
    # everyone's `0 * * * *` jobs contend for runners. GitHub runs scheduled
    # workflows on a best-effort basis and frequently delays (or drops) them
    # under load, so polling more often than strictly needed keeps the cache —
    # and the published site — fresh despite that slippage. JMA issues typhoon
    # bulletins ~every 3h (hourly when near Japan); duplicate bulletins are
    # de-duplicated, so the extra runs are cheap and harmless.
    - cron: "5,35 * * * *"
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

# contents:write lets the poll job push the updated cache; pages/id-token let the
# deploy job publish to GitHub Pages.
permissions:
  contents: write
  pages: write
  id-token: write

# Never let two polls run at once (a manual run + a scheduled run, say) and race
# on the push.
concurrency:
  group: taifu-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Poll JMA
        run: uv run taifu poll --quiet

      - name: Trend report → run summary
        if: always()
        run: uv run taifu report >> "$GITHUB_STEP_SUMMARY" || true

      - name: Commit updated cache
        run: |
          git config user.name "taifu-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "data: poll $(date -u +%FT%TZ)"
            # Re-sync in case anything landed since checkout, then push.
            git pull --rebase --autostash
            git push
          fi

  # Render the (now up-to-date) cache into a static site and publish it.
  # Runs after the poll so the page always reflects the latest bulletin. The
  # generated HTML is NOT committed — it is uploaded as a Pages artifact — so the
  # data history stays a clean record of JMA payloads only.
  pages:
    needs: poll
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url || steps.deploy_retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # The poll job just pushed; grab that commit, not the stale ref.
          ref: ${{ github.ref }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build site
        run: uv run taifu html --out site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      # actions/deploy-pages intermittently fails with GitHub's server-side
      # "Deployment failed, try again later." — a transient Pages-backend flake,
      # not a config error (the artifact uploads fine and the deployment is
      # created; only the status poll fails). A single retry clears virtually
      # all of these. If both attempts fail, the job still goes red so a real
      # outage isn't masked.
      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Deploy to Pages (retry once)
        id: deploy_retry
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4
